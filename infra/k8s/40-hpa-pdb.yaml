apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: langgraph-foundryiq-api
  namespace: langgraph-foundryiq
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: langgraph-foundryiq-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: langgraph-foundryiq-api
  namespace: langgraph-foundryiq
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: langgraph-foundryiq-api

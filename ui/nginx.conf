server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — Angular handles routing client-side
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Reverse-proxy /api/* to the FastAPI service inside the cluster.
  # In AKS this resolves via in-cluster DNS (svc.namespace.svc.cluster.local).
  location /api/ {
    proxy_pass         http://langgraph-foundryiq-api:8000/api/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }

  # Long cache for hashed assets
  location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
